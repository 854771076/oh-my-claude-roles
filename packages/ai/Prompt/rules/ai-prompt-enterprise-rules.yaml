name: AI提示词开发企业级规范
version: "1.0.0"
rules:
  # 二、技术栈限制规则
  - id: techstack-forbid-hardcode-prompt
    description: 禁止使用硬编码字符串模板，必须使用LangChain.js ChatPromptTemplate
    pattern: '(const|let|var)\s+\w+\s*=\s*[\'\"][\s\S]*?\{\w+\}[\s\S]*?[\'\"]'
    severity: error

  - id: techstack-forbid-yup-joi
    description: 输入输出类型校验必须使用Zod，禁止使用Yup或Joi
    pattern: 'import.*from\s+[\'\"](yup|joi)[\'\"]'
    severity: error

  - id: techstack-require-zod
    description: 必须引入Zod进行类型校验
    pattern: 'import.*z\s+from\s+[\'\"]zod[\'\"]'
    severity: error
    negative: true

  - id: techstack-forbid-console-log
    description: 禁止使用console.log记录日志，必须使用Pino + Sentry
    pattern: 'console\.log\('
    severity: warning

  # 3.2 编写强制红线规则
  - id: prompt-forbid-hardcode-secrets
    description: 禁止在提示词中硬编码API密钥、数据库地址等敏感信息
    pattern: '(api|secret|key|token|password|database|db).*?=\s*[\'\"][a-zA-Z0-9+/=]{20,}[\'\"]'
    severity: error

  - id: prompt-forbid-break-constraint
    description: 禁止出现允许模型突破约束的表述（除非用户要求/特殊情况可例外）
    pattern: '除非用户要求|特殊情况可例外|你可以突破|你可以忽略'
    severity: error

  - id: rag-forbid-fake-info
    description: RAG场景禁止允许模型编造信息，必须要求仅使用上下文
    pattern: '(你可以|允许).*?(编造|虚构|猜测)'
    severity: error

  - id: prompt-require-structured-zod
    description: 禁止使用纯自然语言约束输出，必须配合Zod Schema实现结构化输出
    pattern: '请输出.*?(json|格式).*?(?!.*zod)'i
    severity: warning

  # 3.3 类型安全强制规范
  - id: input-require-zod-schema
    description: 所有提示词输入必须定义Zod校验Schema
    pattern: 'z\.object\(\{.*input'
    severity: error
    negative: true

  - id: output-require-zod-schema
    description: 所有提示词输出必须定义Zod校验Schema
    pattern: 'z\.object\(\{.*output'
    severity: error
    negative: true

  - id: output-require-zod-validation
    description: 所有模型输出必须经过Zod二次校验
    pattern: 'z\.parse\(|z\.safeParse\('
    severity: error
    negative: true

  # 4.1 版本管理强制规范
  - id: file-require-prompt-ts
    description: 提示词必须使用.prompt.ts格式封装，禁止使用纯文本文件
    pattern: '\.(prompt|txt|md)$'
    severity: error
    negative: false

  - id: git-require-conventional-commits
    description: Git提交信息必须遵循Conventional Commits规范
    pattern: '^(feat|fix|docs|style|refactor|perf|test|chore)\('
    severity: warning
    negative: true

  # 6.1 安全防护强制规范
  - id: input-require-lakera-guard
    description: 所有用户输入必须接入Lakera Guard进行安全检测
    pattern: 'lakera|guard|detectInject|checkPrompt'
    severity: error
    negative: true

  - id: system-prompt-require-lock
    description: 系统提示词必须加入禁止泄露/复述/修改规则
    pattern: '禁止.*(泄露|翻译|复述|修改).*提示词'
    severity: error
    negative: true

  - id: output-require-safety-check
    description: 所有模型输出必须经过合规审核与敏感信息过滤
    pattern: 'checkOutput|filterSensitive|auditContent'
    severity: error
    negative: true

  - id: logging-require-full-record
    description: 所有提示词调用必须全量日志记录
    pattern: 'requestId|userId|promptVersion|input|output|callTime'
    severity: warning
    negative: true

  # 8.1 代码生成场景规则
  - id: codegen-require-enterprise-spec
    description: 必须要求生成代码遵循企业级TypeScript+Next.js全栈开发规范
    pattern: '企业级.*TypeScript.*全栈开发规范|公司.*开发规范'
    severity: error
    negative: true

  - id: codegen-require-security-check
    description: 必须要求代码包含安全校验措施
    pattern: '防SQL注入|防XSS|权限控制|安全校验'
    severity: error
    negative: true

  # 8.2 RAG场景规则
  - id: rag-require-only-context
    description: RAG必须要求模型仅使用提供的上下文信息
    pattern: '仅使用.*上下文|禁止.*编造|上下文不存在.*不回答'
    severity: error
    negative: true

  - id: rag-require-cite-source
    description: RAG必须要求模型标注引用来源
    pattern: '标注.*来源|引用.*上下文|溯源'
    severity: warning

  # 8.3 智能体/工具调用场景规则
  - id: agent-require-single-node
    description: 单个提示词仅负责单一LangGraph节点逻辑，禁止覆盖全流程
    pattern: 'LangGraph|单一节点|职责单一'
    severity: warning
    negative: true

  - id: tool-require-zod-param
    description: 工具调用入参必须与Zod Schema一致
    pattern: 'z\.object.*tool.*param'
    severity: error
    negative: true

  - id: tool-require-exit
    description: 必须要求模型完成任务后输出结束标识，禁止无限循环
    pattern: '完成任务.*结束|禁止.*无限循环'
    severity: error
    negative: true

  # 8.4 合规审核场景规则
  - id: audit-require-structured-output
    description: 合规审核必须输出结构化结果，匹配Zod Schema
    pattern: '是否通过|违规类型|风险等级|整改建议'
    severity: error
    negative: true

  - id: audit-require-manual-highrisk
    description: 必须要求高风险内容触发人工审核
    pattern: '高风险.*人工审核|禁止模型直接终审'
    severity: error
    negative: true

  # 合规管控规则
  - id: compliance-require-disclaimer-professional
    description: 金融/医疗/法律专业场景必须加入强制免责声明
    pattern: '免责声明|仅供参考|不构成.*(投资建议|医疗诊断|法律意见)'
    severity: error
    negative: true

  - id: compliance-forbid-personal-info
    description: 禁止处理可识别的个人隐私信息
    pattern: '个人信息|隐私数据.*处理'
    severity: error
```